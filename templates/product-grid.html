<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reis & Irvy's</title>
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500&display=swap"
		rel="stylesheet">
	<style>
		:root {
			--teal: #00b4c8;
			--navy: #1a2d3d;
			--pink: #e8196e;
			--green: #00a878;
			--bg: #f3fafb;
			--white: #ffffff;
			--border: #daedf1;
			--muted: #8aabb5;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: var(--bg);
			color: var(--navy);
			font-family: 'Roboto', sans-serif;
		}

		/* ── Header ── */
		header {
			background: var(--navy);
			height: 56px;
			padding: 0 32px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.logo {
			height: 28px;
			filter: brightness(0) invert(1);
		}

		.logo-text {
			font-family: 'Oswald', sans-serif;
			font-size: 16px;
			font-weight: 600;
			color: #fff;
			letter-spacing: 0.08em;
			display: none;
		}

		.cart-btn {
			display: flex;
			align-items: center;
			gap: 7px;
			background: var(--teal);
			color: #fff;
			border: none;
			padding: 7px 14px;
			border-radius: 3px;
			font-family: 'Oswald', sans-serif;
			font-size: 12px;
			font-weight: 500;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			cursor: pointer;
			transition: opacity 0.15s;
		}

		.cart-btn:hover {
			opacity: 0.88;
		}

		.cart-btn svg {
			width: 13px;
			height: 13px;
			stroke: #fff;
			fill: none;
			stroke-width: 2;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		.cart-pill {
			background: var(--pink);
			color: #fff;
			font-size: 10px;
			font-weight: 700;
			min-width: 16px;
			height: 16px;
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0 4px;
			opacity: 0;
			transition: opacity 0.2s;
		}

		.cart-pill.show {
			opacity: 1;
		}

		/* ── Filters ── */
		.filters {
			background: var(--white);
			border-bottom: 1px solid var(--border);
			padding: 11px 32px;
			display: flex;
			align-items: center;
			gap: 6px;
			flex-wrap: wrap;
		}

		.f-label {
			font-size: 10px;
			font-weight: 500;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted);
			margin-right: 4px;
		}

		.f-btn {
			border: 1px solid var(--border);
			background: transparent;
			color: var(--muted);
			font-family: 'Oswald', sans-serif;
			font-size: 11px;
			font-weight: 500;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			padding: 5px 13px;
			border-radius: 2px;
			cursor: pointer;
			transition: all 0.15s;
		}

		.f-btn:hover {
			border-color: var(--teal);
			color: var(--teal);
		}

		.f-btn.active {
			background: var(--teal);
			border-color: var(--teal);
			color: #fff;
		}

		.f-btn.active-pink {
			background: var(--pink);
			border-color: var(--pink);
			color: #fff;
		}

		/* ── Page body ── */
		.body {
			max-width: 1180px;
			margin: 0 auto;
			padding: 32px 32px 64px;
		}

		/* ── Section row ── */
		.section-row {
			display: flex;
			align-items: baseline;
			gap: 8px;
			margin-bottom: 16px;
		}

		.section-row h2 {
			font-family: 'Oswald', sans-serif;
			font-size: 12px;
			font-weight: 600;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: var(--navy);
		}

		.section-row .cnt {
			font-size: 11px;
			color: var(--muted);
		}

		.divider {
			border: none;
			border-top: 1px solid var(--border);
			margin: 36px 0 28px;
		}

		/* ── Grid ── */
		.grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 14px;
		}

		@media (max-width: 1020px) {
			.grid {
				grid-template-columns: repeat(3, 1fr);
			}
		}

		@media (max-width: 680px) {
			.grid {
				grid-template-columns: repeat(2, 1fr);
			}
		}

		@media (max-width: 420px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}

		/* ── Card ── */
		.card {
			background: var(--white);
			border: 1px solid var(--border);
			border-radius: 8px;
			overflow: hidden;
			display: none;
			flex-direction: column;
			transition: transform 0.18s, box-shadow 0.18s;
		}

		.card.visible {
			display: flex;
		}

		.card:hover {
			transform: translateY(-3px);
			box-shadow: 0 6px 20px rgba(0, 180, 200, 0.12);
		}

		/* color accent */
		.accent {
			height: 2px;
			background: var(--teal);
		}

		.accent.sold {
			background: var(--border);
		}

		/* image */
		.img-box {
			aspect-ratio: 1;
			background: linear-gradient(145deg, #eaf8fb 0%, #f3fafb 100%);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 18px;
			position: relative;
			overflow: hidden;
		}

		.img-box img {
			width: 70%;
			height: 70%;
			object-fit: contain;
			mix-blend-mode: multiply;
			filter: drop-shadow(0 3px 7px rgba(0, 0, 0, 0.08));
			transition: transform 0.32s;
		}

		.card:hover .img-box img {
			transform: scale(1.05);
		}

		/* stock badge */
		.stock {
			position: absolute;
			top: 9px;
			right: 9px;
			font-family: 'Oswald', sans-serif;
			font-size: 9px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			padding: 3px 8px;
			border-radius: 2px;
			display: flex;
			align-items: center;
			gap: 3px;
		}

		.stock.in {
			background: var(--green);
			color: #fff;
		}

		.stock.out {
			background: rgba(232, 25, 110, 0.07);
			color: var(--pink);
			border: 1px solid rgba(232, 25, 110, 0.25);
		}

		.stock svg {
			width: 7px;
			height: 7px;
			stroke: currentColor;
			fill: none;
			stroke-width: 2.8;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		/* sold overlay */
		.overlay {
			position: absolute;
			inset: 0;
			background: rgba(243, 250, 251, 0.6);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 2;
		}

		.stamp {
			font-family: 'Oswald', sans-serif;
			font-size: 10px;
			font-weight: 600;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--pink);
			border: 1px solid rgba(232, 25, 110, 0.4);
			padding: 4px 11px;
			border-radius: 2px;
			transform: rotate(-9deg);
			background: rgba(255, 255, 255, 0.85);
		}

		/* info */
		.info {
			padding: 11px 13px 13px;
			border-top: 1px solid var(--border);
			flex: 1;
			display: flex;
			flex-direction: column;
		}

		.tag {
			font-family: 'Oswald', sans-serif;
			font-size: 9px;
			font-weight: 500;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: var(--teal);
			margin-bottom: 2px;
		}

		.name {
			font-family: 'Oswald', sans-serif;
			font-size: 14px;
			font-weight: 600;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			color: var(--navy);
			line-height: 1.2;
			margin-bottom: 10px;
		}

		.row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-top: auto;
			margin-bottom: 10px;
		}

		.price {
			font-family: 'Oswald', sans-serif;
			font-size: 17px;
			font-weight: 600;
			color: var(--navy);
		}

		.sku {
			font-size: 9px;
			color: var(--muted);
			letter-spacing: 0.04em;
		}

		/* buttons */
		.btn-add,
		.btn-out {
			width: 100%;
			padding: 9px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			font-family: 'Oswald', sans-serif;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			border-radius: 3px;
			border: none;
			cursor: pointer;
			transition: all 0.16s;
		}

		.btn-add {
			background: var(--pink);
			color: #fff;
		}

		.btn-add:hover:not(:disabled) {
			background: #cc1560;
			transform: translateY(-1px);
		}

		.btn-add.added {
			background: var(--green);
		}

		.btn-out {
			background: var(--bg);
			color: var(--muted);
			border: 1px solid var(--border);
			cursor: not-allowed;
		}

		.btn-add svg,
		.btn-out svg {
			width: 11px;
			height: 11px;
			stroke: currentColor;
			fill: none;
			stroke-width: 2;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		/* ── Toast ── */
		.toast {
			position: fixed;
			bottom: 20px;
			right: 20px;
			background: var(--navy);
			color: #fff;
			font-size: 12px;
			font-weight: 500;
			padding: 10px 14px;
			border-radius: 5px;
			border-left: 3px solid var(--teal);
			display: flex;
			align-items: center;
			gap: 9px;
			min-width: 180px;
			opacity: 0;
			transform: translateY(8px);
			transition: all 0.22s ease;
			pointer-events: none;
			z-index: 99;
			box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
		}

		.toast.show {
			opacity: 1;
			transform: translateY(0);
		}

		.toast svg {
			width: 12px;
			height: 12px;
			stroke: var(--teal);
			fill: none;
			stroke-width: 2;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		.toast-n {
			margin-left: auto;
			background: var(--teal);
			font-size: 10px;
			font-weight: 700;
			padding: 1px 6px;
			border-radius: 2px;
		}
	</style>
</head>

<body>

	<!-- Header -->
	<header>
		<img class="logo" src="https://reisandirvys.com/images/ReisAndIrvys_Logo_RGB.png" alt="Reis & Irvy's"
			onerror="this.style.display='none';document.getElementById('lt').style.display='block'">
		<span class="logo-text" id="lt">Reis &amp; Irvy's</span>

		<button class="cart-btn">
			<svg viewBox="0 0 24 24">
				<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
				<line x1="3" y1="6" x2="21" y2="6" />
				<path d="M16 10a4 4 0 01-8 0" />
			</svg>
			Cart
			<span class="cart-pill" id="pill">0</span>
		</button>
	</header>

	<!-- Filters -->
	<div class="filters">
		<span class="f-label">Filter</span>
		<button class="f-btn active" onclick="go('all',this)">All</button>
		<button class="f-btn" onclick="go('froyo',this)">Frozen Yogurt</button>
		<button class="f-btn" onclick="go('gelato',this)">Gelato</button>
		<button class="f-btn" onclick="go('sorbet',this)">Sorbet</button>
		<button class="f-btn" onclick="go('topping',this)">Toppings</button>
		<button class="f-btn" onclick="go('instock',this)">In Stock</button>
	</div>

	<!-- Body -->
	<div class="body">
		<div class="section-row">
			<h2>Flavors</h2><span class="cnt" id="fc"></span>
		</div>
		<div class="grid" id="fg"></div>

		<hr class="divider">

		<div class="section-row">
			<h2>Toppings</h2><span class="cnt" id="tc"></span>
		</div>
		<div class="grid" id="tg"></div>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast">
		<svg viewBox="0 0 24 24">
			<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
			<line x1="3" y1="6" x2="21" y2="6" />
			<path d="M16 10a4 4 0 01-8 0" />
		</svg>
		Added to cart <span class="toast-n" id="tn">0</span>
	</div>

	<script>
		const F = 'https://reisandirvys.com/images/flavors/';
		const T = 'https://reisandirvys.com/images/toppings/';
		const LABEL = { froyo: 'Frozen Yogurt', gelato: 'Gelato', sorbet: 'Sorbet', topping: 'Topping' };

		const flavors = [
			{ id: 1, name: 'Classic Chocolate', sku: 'RI-F-001', price: '₱149', type: 'froyo', img: F + 'ClassicChocolate.png', s: 'instock' },
			{ id: 2, name: 'Strawberry', sku: 'RI-F-002', price: '₱149', type: 'froyo', img: F + 'Strawberry.png', s: 'instock' },
			{ id: 3, name: 'White Vanilla', sku: 'RI-F-003', price: '₱149', type: 'froyo', img: F + 'WhiteVanilla.png', s: 'instock' },
			{ id: 4, name: 'Peanut Butter', sku: 'RI-F-004', price: '₱149', type: 'froyo', img: F + 'PeanutButter.png', s: 'outofstock' },
			{ id: 5, name: "Cookies n' Cream", sku: 'RI-F-005', price: '₱159', type: 'froyo', img: F + 'CookiesnCream.png', s: 'instock' },
			{ id: 6, name: 'Salted Caramel', sku: 'RI-F-006', price: '₱159', type: 'froyo', img: F + 'SaltedCaramel.png', s: 'instock' },
			{ id: 7, name: 'Alpine Vanilla', sku: 'RI-F-007', price: '₱149', type: 'froyo', img: F + 'AlpineVanilla.png', s: 'outofstock' },
			{ id: 8, name: 'Dutch Chocolate', sku: 'RI-F-008', price: '₱149', type: 'froyo', img: F + 'DutchChocolate.png', s: 'instock' },
			{ id: 9, name: 'Pink Lemonade', sku: 'RI-F-009', price: '₱149', type: 'sorbet', img: F + 'PinkLemonade.png', s: 'instock' },
			{ id: 10, name: 'NY Cheesecake', sku: 'RI-F-010', price: '₱169', type: 'froyo', img: F + 'NYCheesecake.png', s: 'instock' },
			{ id: 11, name: 'Watermelon', sku: 'RI-F-011', price: '₱149', type: 'sorbet', img: F + 'Watermelon.png', s: 'outofstock' },
			{ id: 12, name: 'Mango Sunrise', sku: 'RI-F-012', price: '₱149', type: 'sorbet', img: F + 'MangoSunrise.png', s: 'instock' },
			{ id: 13, name: 'Chocolate Fudge', sku: 'RI-F-013', price: '₱159', type: 'froyo', img: F + 'ChocolateFudge.png', s: 'instock' },
			{ id: 14, name: 'Chocolate Gelato', sku: 'RI-F-014', price: '₱169', type: 'gelato', img: F + 'ChocolateGelato.png', s: 'instock' },
			{ id: 15, name: 'Vanilla Gelato', sku: 'RI-F-015', price: '₱169', type: 'gelato', img: F + 'VanillaGelato.png', s: 'outofstock' },
			{ id: 16, name: 'Cake Batter', sku: 'RI-F-016', price: '₱159', type: 'froyo', img: F + 'CakeBatter.png', s: 'instock' },
			{ id: 17, name: 'Pomegranate Raspberry', sku: 'RI-F-017', price: '₱149', type: 'sorbet', img: F + 'PomegranateRaspberry.png', s: 'instock' },
			{ id: 18, name: 'Pumpkin', sku: 'RI-F-018', price: '₱159', type: 'froyo', img: F + 'Pumpkin.png', s: 'outofstock' },
		];

		const toppings = [
			{ id: 101, name: 'Chocolate Sprinkles', sku: 'RI-T-001', price: '₱49', type: 'topping', img: T + 'ChocolateSprinkles.png', s: 'instock' },
			{ id: 102, name: 'Fruity Pebbles', sku: 'RI-T-002', price: '₱59', type: 'topping', img: T + 'FruityPebbles.png', s: 'instock' },
			{ id: 103, name: 'M&Ms', sku: 'RI-T-003', price: '₱59', type: 'topping', img: T + 'M&Ms.png', s: 'outofstock' },
			{ id: 104, name: 'Peanuts', sku: 'RI-T-004', price: '₱49', type: 'topping', img: T + 'Peanuts.png', s: 'instock' },
			{ id: 105, name: 'Rainbow Sprinkles', sku: 'RI-T-005', price: '₱49', type: 'topping', img: T + 'RainbowSprinkles.png', s: 'instock' },
			{ id: 106, name: "Reese's Pieces", sku: 'RI-T-006', price: '₱59', type: 'topping', img: T + 'ReesesPieces.png', s: 'instock' },
			{ id: 107, name: 'Granola', sku: 'RI-T-007', price: '₱49', type: 'topping', img: T + 'Granola.png', s: 'outofstock' },
			{ id: 108, name: "Cap'n Crunch", sku: 'RI-T-008', price: '₱59', type: 'topping', img: T + 'CapNCrunch.png', s: 'instock' },
		];

		let total = 0, tmr;

		function mkCard(p) {
			const ok = p.s === 'instock';
			return `
    <div class="card visible" data-type="${p.type}" data-s="${p.s}">
      <div class="accent${ok ? '' : ' sold'}"></div>
      <div class="img-box">
        <img src="${p.img}" alt="${p.name}" loading="lazy"
             onerror="this.src='https://via.placeholder.com/220/eaf8fb/00b4c8?text=${encodeURIComponent(p.name)}'">
        <div class="stock ${ok ? 'in' : 'out'}">
          <svg viewBox="0 0 24 24">${ok
					? '<polyline points="20 6 9 17 4 12"/>'
					: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
				}</svg>
          ${ok ? 'In Stock' : 'Sold Out'}
        </div>
        ${!ok ? '<div class="overlay"><div class="stamp">Sold Out</div></div>' : ''}
      </div>
      <div class="info">
        <div class="tag">${LABEL[p.type]}</div>
        <div class="name">${p.name}</div>
        <div class="row">
          <span class="price">${p.price}</span>
          <span class="sku">${p.sku}</span>
        </div>
        ${ok
					? `<button class="btn-add" onclick="addCart(this,${p.id})">
               <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
               Add to Cart
             </button>`
					: `<button class="btn-out" disabled>
               <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
               Out of Stock
             </button>`
				}
      </div>
    </div>`;
		}

		function render() {
			document.getElementById('fg').innerHTML = flavors.map(mkCard).join('');
			document.getElementById('tg').innerHTML = toppings.map(mkCard).join('');
			recount();
		}

		function go(f, btn) {
			document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active', 'active-pink'));
			btn.classList.add(f === 'instock' ? 'active-pink' : 'active');
			document.querySelectorAll('.card').forEach(c => {
				const show = f === 'all' ? true : f === 'instock' ? c.dataset.s === 'instock' : c.dataset.type === f;
				c.classList.toggle('visible', show);
				c.style.display = show ? '' : 'none';
			});
			recount();
		}

		function recount() {
			let f = 0, t = 0;
			document.querySelectorAll('#fg .card').forEach(c => { if (c.style.display !== 'none') f++; });
			document.querySelectorAll('#tg .card').forEach(c => { if (c.style.display !== 'none') t++; });
			document.getElementById('fc').textContent = f;
			document.getElementById('tc').textContent = t;
		}

		function addCart(btn, id) {
			if (btn.disabled) return;
			btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Adding…`;
			btn.disabled = true;
			/* WooCommerce: fetch(\`/?add-to-cart=\${id}&quantity=1\`) */
			setTimeout(() => {
				btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Added`;
				btn.classList.add('added');
				total++;
				const p = document.getElementById('pill');
				p.textContent = total; p.classList.add('show');
				showToast();
				setTimeout(() => {
					btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Add to Cart`;
					btn.classList.remove('added'); btn.disabled = false;
				}, 2200);
			}, 450);
		}

		function showToast() {
			const t = document.getElementById('toast');
			document.getElementById('tn').textContent = total;
			t.classList.add('show');
			clearTimeout(tmr);
			tmr = setTimeout(() => t.classList.remove('show'), 2600);
		}

		render();
	</script>
</body>

</html>
